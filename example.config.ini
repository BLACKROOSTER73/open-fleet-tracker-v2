; Full path: steeljet_tracker/example.config.ini
;
; Copy this file to config.ini (same directory as fleet_tracker.py) and fill
; in your own values. Every key shown here matches a Config attribute in
; config.py, including the fallback used if you omit the key entirely.

[logging]
log_file = opensky_alerts.log
max_bytes = 5242880
backup_count = 5

[opensky]
; Either user/password (basic auth) OR client_id/client_secret (OAuth2
; TokenManager) -- if client_id/client_secret are set, they take priority.
user =
password =
client_id =
client_secret =

[discord]
webhook_url =
avatar_url = https://i.imgur.com/4M34hi2.png
app_name = SteelJet Tracker

[smtp]
; Used only as a fallback when the Discord webhook fails.
host =
port = 587
user =
password =
to =
from_name = SteelJet Tracker Alerts

[tracker]
; NOTE: with a bounding box this large (see below), every OpenSky poll
; still costs the maximum "global" credit tier (4 credits/call), so the
; box below does NOT reduce your credit usage -- it only filters out
; aircraft outside North America/Mexico/the Bahamas. The lever that
; actually keeps you inside your daily credit budget is poll_seconds.
; At 4 credits/call, an authenticated account (4,000 credits/day) can
; sustain 24/7 polling no faster than ~86 seconds/poll with zero margin;
; 120 seconds leaves comfortable headroom for occasional follow-up
; lookups too. Lower this only if you have a higher-tier OpenSky account.
poll_seconds = 120
max_backoff = 1800
airports_csv = airports.csv
runways_csv = runways.csv
airport_lookup_radius_miles = 20.0
min_runway_length_ft = 4000
altitude_threshold_ft = 1500.0
altitude_reset_ft = 2000.0
landing_descent_threshold_ft = 10000.0
; Comma-separated list of ICAO24 hex codes to track (lowercase or uppercase, doesn't matter).
icaos = a1b2c3,d4e5f6
; Optional -- defaults to alert_state.json next to fleet_tracker.py.
; Point this at your existing alert_state.json if migrating from the
; original single-file script; no format changes were made.
state_file = alert_state.json

; Optional bounding box (WGS-84 decimal degrees) so OpenSky only returns
; aircraft within this region instead of the whole globe. Set all four or
; leave all four blank -- partial boxes raise a startup error.
; This one covers Canada, the continental US + Alaska, Mexico, and the
; Bahamas. Aircraft outside this box (e.g. over the Atlantic, Europe,
; South America past Mexico) will not be detected at all -- only use this
; if your tracked aircraft never leave this region.
; Area = (75 - 14.5) deg lat x (-50 - -170) deg lon = 7260 sq deg, which is
; still in OpenSky's ">400 sq deg / global" credit tier -- see the note
; above poll_seconds for why this box does not reduce credit cost.
bbox_min_lat = 14.5
bbox_max_lat = 75
bbox_min_lon = -170
bbox_max_lon = -50

[alerts]
landing_recheck_seconds = 300
landing_alt_margin_ft = 250.0
cool_down_seconds = 300.0
climb_delta_ft = 250.0
landing_on_ground_hold_seconds = 480
landing_on_ground_min_polls = 2
landing_no_position_timeout_seconds = 900
airborne_tracking_altitude_ft = 5000.0
; How long (seconds) to wait after an unconfirmed "likely landing" alert
; before sending the automatic confirmation follow-up.
followup_delay_seconds = 1200
; Altitude (ft) above which an aircraft is marked "seen airborne" and thus
; becomes eligible for landing-detection at all.
seen_airborne_altitude_ft = 500.0

[weather]
timeout_seconds = 12

[aircraft_types]
; Optional free-form icao24 -> human readable type mapping, e.g.:
; a1b2c3 = Gulfstream G650

; ---------------------------------------------------------------------------
; The two sections below are NEW, optional, and disabled by default. They do
; not change any existing tracker behavior when left as-is.
; ---------------------------------------------------------------------------

[api]
; Placeholder for a future local read-only status server. Not implemented
; yet -- safe to leave disabled.
enabled = false
host = 127.0.0.1
port = 8787

[events]
; If enabled, appends one JSON line per tracker event (candidate created,
; alert sent, alert suppressed, etc.) to events_file, purely for debugging.
enabled = false
events_file = events.jsonl
