; Full path: open-fleet-tracker/example.config.ini
;
; Copy this file to config.ini (same directory as fleet_tracker.py) and fill
; in your own values. Every key shown here matches a Config attribute in
; config.py, including the fallback used if you omit the key entirely.

[general]
; Single source of truth for anything announced to the user: the console
; startup log line, the Discord embed username, and the email From name.
; Change this one key to rebrand everywhere at once. discord.app_name and
; smtp.from_name below still let you override just that one channel if
; you want it to say something different from the console/general name.
app_name = Open Fleet Tracker

[logging]
log_file = tracker_alerts.log
max_bytes = 5242880
backup_count = 5

[opensky]
; Either user/password (basic auth) OR client_id/client_secret (OAuth2
; TokenManager) -- if client_id/client_secret are set, they take priority.
user =
password =
client_id =
client_secret =

[discord]
webhook_url =
avatar_url = https://i.imgur.com/4M34hi2.png
; Leave blank to use [general] app_name above.
app_name =

[smtp]
; Used only as a fallback when the Discord webhook fails.
host =
port = 587
user =
password =
to =
; Leave blank to use "<[general] app_name> Alerts".
from_name =

[tracker]
; NOTE: with a bounding box this large (see below), every OpenSky poll
; still costs the maximum "global" credit tier (4 credits/call), so the
; box below does NOT reduce your credit usage -- it only filters out
; aircraft outside North America/Mexico/the Bahamas. The lever that
; actually keeps you inside your daily credit budget is poll_seconds.
; At 4 credits/call, an authenticated account (4,000 credits/day) can
; sustain 24/7 polling no faster than ~86 seconds/poll with zero margin;
; 120 seconds leaves comfortable headroom for occasional follow-up
; lookups too. Lower this only if you have a higher-tier OpenSky account.
poll_seconds = 120
max_backoff = 1800
airports_csv = airports.csv
runways_csv = runways.csv
airport_lookup_radius_miles = 20.0
min_runway_length_ft = 4000
altitude_threshold_ft = 1500.0
altitude_reset_ft = 2000.0
landing_descent_threshold_ft = 10000.0
; Comma-separated list of ICAO24 hex codes to track (lowercase or uppercase, doesn't matter).
icaos = a1b2c3,d4e5f6
; Optional -- defaults to alert_state.json next to fleet_tracker.py.
; Point this at your existing alert_state.json if migrating from the
; original single-file script; no format changes were made.
state_file = alert_state.json

; Optional bounding box (WGS-84 decimal degrees) so OpenSky only returns
; aircraft within this region instead of the whole globe. Set all four or
; leave all four blank -- partial boxes raise a startup error.
; This one covers Canada, the continental US + Alaska, Mexico, and the
; Bahamas. Aircraft outside this box (e.g. over the Atlantic, Europe,
; South America past Mexico) will not be detected at all -- only use this
; if your tracked aircraft never leave this region.
; Area = (75 - 14.5) deg lat x (-50 - -170) deg lon = 7260 sq deg, which is
; still in OpenSky's ">400 sq deg / global" credit tier -- see the note
; above poll_seconds for why this box does not reduce credit cost.
bbox_min_lat = 14.5
bbox_max_lat = 75
bbox_min_lon = -170
bbox_max_lon = -50

[alerts]
landing_recheck_seconds = 300
landing_alt_margin_ft = 250.0
cool_down_seconds = 300.0
climb_delta_ft = 250.0
landing_on_ground_hold_seconds = 480
landing_on_ground_min_polls = 2
; How long (seconds) a landing candidate can go completely quiet (no fresh
; position/contact update at all from OpenSky) before it's even considered
; for a quiet-timeout "likely landing". Slightly increased from the old
; 900s default: OpenSky can already drop individual stale position/velocity
; fields after ~15s of no update, so a short whole-aircraft quiet window
; risks calling a landing on what's really just a brief coverage gap.
landing_no_position_timeout_seconds = 1080
airborne_tracking_altitude_ft = 5000.0
; --- quiet-timeout landing confidence scoring ---
; Once landing_no_position_timeout_seconds has elapsed with no updates, the
; candidate is scored instead of alerted on immediately:
;   +3 if on_ground was ever seen for this candidate
;   +2 if lowest tracked altitude is below landing_quiet_low_alt_ft
;   +2 if current (last known) altitude is below landing_quiet_current_alt_ft
;   +1 if the last known vertical rate was negative (descending)
;   +1 if the last known speed is below landing_quiet_speed_kn
;   +1 if the aircraft had previously been marked "seen airborne"
;   +1 if it disappeared after entering candidate state (got at least one
;      fresh update after being created as a candidate), not immediately
; A score at or above landing_quiet_confidence_threshold sends a "likely
; landing" alert as before. Below threshold, the candidate keeps waiting
; and is rescored on each tick, up to landing_quiet_hard_cap_seconds, after
; which it's suppressed and dropped rather than alerting on weak evidence.
landing_quiet_confidence_threshold = 5
landing_quiet_hard_cap_seconds = 2700
landing_quiet_low_alt_ft = 1500.0
landing_quiet_current_alt_ft = 2500.0
landing_quiet_speed_kn = 160.0
; --- airport-elevation landing confirmation ---
; Independent confirmation signal, checked every tick alongside on_ground:
; if a candidate's current altitude is within landing_airport_elevation_margin_ft
; of the nearest matching airport's surveyed field elevation (from
; airports.csv) for landing_airport_elevation_min_polls consecutive polls
; in a row, it's treated the same as on_ground and confirmed immediately --
; useful since not every transponder/receiver pairing reports on_ground
; reliably, but altitude vs. known field elevation is available whenever
; geo/baro altitude is. Requires airports.csv to include an elevation_ft
; column (the standard OurAirports schema already does); if it's missing,
; this check is silently skipped and everything else works as before.
landing_airport_elevation_margin_ft = 100.0
landing_airport_elevation_min_polls = 2
; How long (seconds) to wait after an unconfirmed "likely landing" alert
; before sending the automatic confirmation follow-up.
followup_delay_seconds = 1200
; Altitude (ft) above which an aircraft is marked "seen airborne" and thus
; becomes eligible for landing-detection at all.
seen_airborne_altitude_ft = 500.0

[weather]
timeout_seconds = 12

[aircraft_types]
; Optional free-form icao24 -> human readable type mapping, e.g.:
; a1b2c3 = Gulfstream G650

; ---------------------------------------------------------------------------
; The three sections below are NEW, optional, and disabled by default. They
; do not change any existing tracker behavior when left as-is.
; ---------------------------------------------------------------------------

[fallback]
; Optional free fallback data source (adsb.fi by default; adsb.lol runs the
; same schema if you'd rather point base_url there). Only ever queried for
; tracked ICAO24s that OpenSky's own poll did not return in a given cycle --
; e.g. an aircraft that sits in an area with sparser OpenSky receiver
; coverage than ADS-B Exchange's. Never replaces OpenSky as the primary
; source, and costs zero extra requests when every tracked aircraft is
; already visible via OpenSky. Free for personal/non-commercial use; see
; https://github.com/adsbfi/opendata/blob/main/README.md. If you enable
; this, please keep crediting adsb.fi (https://adsb.fi) per their terms.
enabled = false
base_url = https://opendata.adsb.fi/api
timeout_seconds = 10

[api]
; Placeholder for a future local read-only status server. Not implemented
; yet -- safe to leave disabled.
enabled = false
host = 127.0.0.1
port = 8787

[events]
; If enabled, appends one JSON line per tracker event (candidate created,
; alert sent, alert suppressed, etc.) to events_file, purely for debugging.
enabled = false
events_file = events.jsonl
